<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RikHealth-Pro | Analytics Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b132b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 700px; background: #1c2541; margin: 30px auto; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { color: #5dade2; margin-top: 0; }
        nav { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #3a506b; }
        .nav-btn { display: inline-block; padding: 10px 18px; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: bold; margin: 0 5px; color: white; }
        .btn-tracker { background: #2ecc71; }
        .btn-reminder { background: #e67e22; }
        .chart-box { background: white; padding: 15px; border-radius: 6px; margin-top: 20px; }
        iframe { width: 100%; height: 320px; border: none; }
        .no-data { color: #a6acaf; padding: 40px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <a href="tracker.html" class="nav-btn btn-tracker">← Data Tracker</a>
        <a href="reminder.html" class="nav-btn btn-reminder">Set Reminders 🔔</a>
    </nav>
    
    <h2>Health Analytics Dashboard</h2>
    
    <div id="noDataMessage" class="no-data" style="display: none;">
        No tracking data found. Go log some metrics first!
    </div>

    <!-- The Cloud Rendering Frame Container -->
    <div id="chartWrapper" class="chart-box">
        <iframe id="cloudChartFrame"></iframe>
    </div>
</div>

<script>
    const storedData = JSON.parse(localStorage.getItem('healthData')) || [];

    if (storedData.length === 0) {
        document.getElementById('chartWrapper').style.display = 'none';
        document.getElementById('noDataMessage').style.display = 'block';
    } else {
        // Parse database arrays from local cache memory
        const labels = storedData.map(entry => entry.date);
        const waterData = storedData.map(entry => entry.water);
        const sleepData = storedData.map(entry => entry.sleep);

        // Define a structured chart configuration packet
        const chartConfig = {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Water (ml)', data: waterData, backgroundColor: '#3498db' },
                    { label: 'Sleep (hrs)', data: sleepData, backgroundColor: '#9b59b6' }
                ]
            }
        };

        // Convert data packet to an URL encoded string component
        const encodedConfig = encodeURIComponent(JSON.stringify(chartConfig));
        
        // Feed the string to the iFrame source path for real-time generation
        const cloudChartUrl = `https://quickchart.io{encodedConfig}`;
        document.getElementById('cloudChartFrame').src = cloudChartUrl;
    }
</script>

</body>
</html>
