<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RikHealth-Pro | Data Logger</title>
    <style>
          body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ffffff; color: #1a252f; margin: 0; padding: 0 0 20px 0; text-align: center; }
        .container { max-width: 500px; background: #ffffff; margin: 30px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #eef2f5; }
        h2 { color: #1a252f; margin-top: 0; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #5a6a85; font-size: 14px; }
        input[type="number"] { width: 100%; padding: 12px; background: #f8f9fa; border: 1px solid #dcdfe3; border-radius: 6px; color: #1a252f; box-sizing: border-box; font-size: 16px; }
        input[type="number"]:focus { border-color: #00acc1; outline: none; }

        input[type="number"]:focus { border-color: #5dade2; outline: none; }
        
        button { width: 100%; padding: 14px; background: #2ecc71; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s, transform 0.1s; box-shadow: 0 4px 10px rgba(46,204,113,0.2); }
        button:hover { background: #27ae60; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        
        .log-box { margin-top: 30px; padding-top: 20px; border-top: 1px solid #3a506b; text-align: left; }
        .log-item { background: #151e3d; padding: 12px; border-left: 4px solid #2ecc71; margin-bottom: 10px; font-size: 14px; border-radius: 0 6px 6px 0; border: 1px solid #2a3a5c; border-left: 4px solid #2ecc71; color: #e5e8e8; }
    </style>
</head>
<body>

<!-- Full-Width RikMakersHub Pro Style Top Header Banner -->
<header style="background-color: #1a252f; color: white; text-align: center; padding: 2.5rem 1rem; border-bottom: 4px solid #00acc1; margin-bottom: 2rem;">
    <div style="font-size: 42px; margin-bottom: 8px;">🩺</div>
    <h1 style="font-size: 2.5rem; margin: 0 0 10px 0; font-weight: 800; font-family: 'Segoe UI', Arial, sans-serif; color: white;">RikHealth-Pro</h1>
    <p style="font-size: 1.05rem; color: #f4f9fa; margin: 0 auto 25px auto; max-width: 600px; opacity: 0.85; font-weight: 500;">
        |Advanced Client-Side Health Diagnostics and Multi-Metric Trend Analysis by RikMakersHub|
    </p>
    
    <!-- Unified Capsule Navigation Bar -->
    <nav style="display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #00b4db, #0083b0); padding: 6px 12px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0, 180, 219, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); flex-wrap: wrap; gap: 3px;">
        <a href="tracker.html" style="color: #ffffff; text-decoration: none; padding: 8px 16px; border-radius: 50px; font-size: 14px; font-weight: bold; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px; background: rgba(255, 255, 255, 0.15); box-shadow: inset 0 1px 3px rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.1);">
            📝 Log Metrics
        </a>
        <span style="color: rgba(255,255,255,0.3); font-weight: 300;">|</span>
        <a href="analytics.html" style="color: #ffffff; text-decoration: none; padding: 8px 16px; border-radius: 50px; font-size: 14px; font-weight: bold; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px;">
            📈 Analytics Dashboard
        </a>
        <span style="color: rgba(255,255,255,0.3); font-weight: 300;">|</span>
        <a href="reminder.html" style="color: #ffffff; text-decoration: none; padding: 8px 16px; border-radius: 50px; font-size: 14px; font-weight: bold; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px;">
            🔔 Reminders
        </a>
    </nav>
</header>

<div class="container">

    
    <h2>Daily Metric Logger</h2>
    
    <form id="trackerForm">
        <div class="form-group">
            <label for="water">💧 Water Intake (ml):</label>
            <input type="number" id="water" min="0" required placeholder="e.g., 2500">
        </div>
        
        <div class="form-group">
            <label for="sleep">😴 Sleep Duration (Hours):</label>
            <input type="number" id="sleep" min="0" max="24" step="0.5" required placeholder="e.g., 8">
        </div>
        
        <div class="form-group">
            <label for="exercise">🏃 Active Minutes:</label>
            <input type="number" id="exercise" min="0" required placeholder="e.g., 45">
        </div>
        
        <button type="submit">Commit Daily Metrics</button>
    </form>

    <div class="log-box">
        <h3 style="color: #5dade2; margin-top: 0;">Recent Database History</h3>
        <div id="logContainer"></div>
    </div>
  <footer>
        © RikHealth-Pro ecosystem supported by RikMakersHub. All Rights Reserved.
    </footer>
</div>

<script>
    const trackerForm = document.getElementById('trackerForm');
    const logContainer = document.getElementById('logContainer');

    function displayLogs() {
        logContainer.innerHTML = '';
        const healthData = JSON.parse(localStorage.getItem('healthData')) || [];
        
        healthData.reverse().forEach(entry => {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<strong>Date:</strong> ${entry.date}<br>
                             💧 ${entry.water}ml | 😴 ${entry.sleep} hrs | 🏃 ${entry.exercise} mins`;
            logContainer.appendChild(div);
        });
    }

    trackerForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const waterVal = document.getElementById('water').value;
        const sleepVal = document.getElementById('sleep').value;
        const exerciseVal = document.getElementById('exercise').value;
        const currentDate = new Date().toLocaleDateString();

        const newEntry = {
            date: currentDate,
            water: waterVal,
            sleep: sleepVal,
            exercise: exerciseVal
        };

        const currentData = JSON.parse(localStorage.getItem('healthData')) || [];
        currentData.push(newEntry);
        localStorage.setItem('healthData', JSON.stringify(currentData));

        trackerForm.reset();
        displayLogs();
    });

    displayLogs();
</script>

</body>
</html>
